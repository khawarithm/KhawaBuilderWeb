<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Addon Marketplace</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0e0e0e;
color:white;
}

#header{
padding:15px;
background:#121212;
display:flex;
justify-content:space-between;
}

#grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1a1a1a;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card button{
width:100%;
margin-top:5px;
padding:6px;
border:none;
border-radius:6px;
background:#333;
color:white;
}

.vip{
background:#ff9800;
}
</style>
</head>

<body>

<div id="header">
<b>Addon Marketplace</b>
<button onclick="back()">⬅</button>
</div>

<div id="grid"></div>

<script>

/* FIREBASE */
const firebaseConfig={
apiKey:"AIzaSyCFBq7tASy3IeRb-GFaLFuvB5NcwydkHUM",
authDomain:"knockthem-25783.firebaseapp.com",
projectId:"knockthem-25783"
};

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

let grid=document.getElementById("grid")

/* LOAD ADDONS */
async function loadAddons(){

let snap=await db.collection("addons").get()

grid.innerHTML=""

snap.forEach(doc=>{

let a=doc.data()

let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<h3>${a.name}</h3>

<button onclick="install('${doc.id}')">Install</button>
<button onclick="useAddon('${doc.id}')">Gunakan</button>

${a.vip ? '<button class="vip" onclick="unlockVIP()">Unlock VIP</button>' : ''}
`

grid.appendChild(div)

})

}

/* INSTALL */
async function install(id){

let doc=await db.collection("addons").doc(id).get()
let data=doc.data()

localStorage.setItem("addon_"+id, data.code)

alert("Addon terinstall!")
}

/* USE */
function useAddon(id){

let data=localStorage.getItem("vip")
let addon=localStorage.getItem("addon_"+id)

if(!addon){
alert("Install dulu!")
return
}

/* CEK VIP */
if(id=="jsplus" && !data){
alert("VIP dulu!")
return
}

localStorage.setItem("activeAddon", id)

alert("Addon aktif!")
}

/* VIP */
function unlockVIP(){
alert("Nonton iklan 5 detik...")

setTimeout(()=>{
localStorage.setItem("vip","true")
alert("VIP aktif!")
},5000)
}

function back(){
location.href="index.html"
}

loadAddons()

</script>

</body>
</html>
