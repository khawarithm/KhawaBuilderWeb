<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KhawaBuild X</title>

<style>
body{margin:0;font-family:Arial;background:#0e0e0e;color:white}

#topbar{
display:flex;justify-content:space-between;
padding:10px;background:#121212
}

button{
background:#1f1f1f;color:white;border:none;
padding:8px;margin:2px;border-radius:6px
}

#preview{
background:white;color:black;
min-height:80vh;margin:10px;
padding:10px;border-radius:10px
}

.element{
border:2px dashed transparent;
margin:8px;padding:10px;
position:relative
}
.element.selected{border-color:#00aaff}

.deleteBtn{
position:absolute;top:-10px;right:-10px;
background:red;color:white;border:none;
border-radius:50%
}

#panel{
position:fixed;bottom:0;width:100%;
background:#181818;display:none;
max-height:60vh;overflow:auto;padding:10px
}

.panelbtn{
width:100%;padding:10px;margin:5px 0;
background:#333;color:white;border:none
}

.container{
border:2px dashed #aaa;
min-height:80px;padding:10px
}
</style>
</head>

<body>

<div id="topbar">
<div>
<button onclick="openAdd()">Add</button>
<button onclick="openStyle()">Style</button>
<button onclick="runAddon()">Addon</button>
<button onclick="downloadHTML()">Download</button>
</div>
</div>

<div id="preview"></div>
<div id="panel"></div>

<script>

let preview=document.getElementById("preview")
let panel=document.getElementById("panel")
let selected=null

/* SELECT */
function select(el){
if(selected)selected.classList.remove("selected")
selected=el
el.classList.add("selected")
}

/* CREATE */
function create(html){
let target=preview

if(selected && selected.querySelector(".container")){
target=selected.querySelector(".container")
}

let el=document.createElement("div")
el.className="element"
el.innerHTML=`<button class="deleteBtn">x</button>${html}`

el.addEventListener("click",function(e){
if(e.target!==el) return
select(el)
})

el.querySelector(".deleteBtn").onclick=e=>{
e.stopPropagation()
el.remove()
}

target.appendChild(el)
}

/* ADD */
function openAdd(){
panel.style.display="block"
panel.innerHTML=`
<b>Add</b>
<button onclick="closePanel()">X</button>

<button class="panelbtn" onclick="create('<h1 contenteditable>Header</h1>')">Header</button>
<button class="panelbtn" onclick="create('<p contenteditable>Text</p>')">Text</button>
<button class="panelbtn" onclick="create('<button>Button</button>')">Button</button>
<button class="panelbtn" onclick="create('<div class=container></div>')">Container</button>
`
}

/* STYLE ANGKA */
function openStyle(){
if(!selected){alert("Pilih dulu");return}

panel.style.display="block"

panel.innerHTML=`
<b>Style</b>
<button onclick="closePanel()">X</button>

Color<input type=color oninput="selected.style.color=this.value">
Bg<input type=color oninput="selected.style.background=this.value">

Font Size
<input type=number oninput="selected.style.fontSize=this.value+'px'">

Width
<input type=number oninput="selected.style.width=this.value+'px'">

Height
<input type=number oninput="selected.style.height=this.value+'px'">

Padding
<input type=number oninput="selected.style.padding=this.value+'px'">

Margin
<input type=number oninput="selected.style.margin=this.value+'px'">

Text Align
<select onchange="selected.style.textAlign=this.value">
<option>left</option>
<option>center</option>
<option>right</option>
</select>
`
}

/* EXPORT FIX */
function downloadHTML(){

let clone=preview.cloneNode(true)

/* hapus UI */
clone.querySelectorAll(".deleteBtn").forEach(e=>e.remove())
clone.querySelectorAll(".element").forEach(e=>{
e.classList.remove("element","selected")
})

let html=`
<!DOCTYPE html>
<html>
<head>
<style>
body{font-family:Arial}
</style>
</head>
<body>

${clone.innerHTML}

</body>
</html>
`

let blob=new Blob([html])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="index.html"
a.click()
}

/* ADDON PARSER */
function parseAddon(code){

let lines=code.split("\n")

let name=""
let blocks=[]

lines.forEach(line=>{

if(line.startsWith("namaaddon:")){
name=line.split(":")[1]
}

if(line.startsWith("add:")){
let part=line.replace("add:","")
let [title,cmd]=part.split("=")

blocks.push({
title:title.trim(),
code:cmd.trim()
})
}

})

return {name,blocks}
}

/* RUN ADDON */
function runAddon(){

let raw=localStorage.getItem("addon_active")

if(!raw){
alert("Belum ada addon")
return
}

let addon=parseAddon(raw)

panel.style.display="block"
panel.innerHTML=`<b>${addon.name}</b><button onclick="closePanel()">X</button>`

addon.blocks.forEach(b=>{
panel.innerHTML+=`
<button class="panelbtn" onclick="runBlock(\`${b.code}\`)">
${b.title}
</button>
`
})

}

/* RUN BLOCK */
function runBlock(code){

if(!selected){
alert("Pilih element dulu")
return
}

/* selected */
code=code.replace("(selected)","selected")

/* input */
if(code.includes("(input)")){
let val=prompt("Masukkan nilai:")
code=code.replace("(input)",val)
}

/* select */
if(code.includes("(select)")){
let val=prompt("Masukkan pilihan:")
code=code.replace("(select)",val)
}

try{
eval(code)
}catch(e){
alert("Error addon")
console.log(e)
}

}

/* PANEL */
function closePanel(){
panel.style.display="none"
}

</script>

</body>
</html>
