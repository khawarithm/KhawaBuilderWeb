<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KhawaBuild X PRO</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0e0e0e;
color:white;
}

/* START */
#startMenu{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:#111;
z-index:999;
}

.startBtn{
padding:14px 20px;
background:#00aaff;
border:none;
color:white;
border-radius:6px;
}

/* TOPBAR */
#topbar{
background:#121212;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}

#topbar button{
background:#1f1f1f;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
margin:2px;
}

/* PREVIEW */
#preview{
background:white;
color:black;
min-height:80vh;
margin:10px;
border-radius:10px;
padding:10px;
}

/* ELEMENT */
.element{
border:2px dashed transparent;
padding:10px;
margin:8px 0;
position:relative;
}

.element.selected{
border-color:#00aaff;
}

/* DELETE */
.deleteBtn{
position:absolute;
top:-10px;
right:-10px;
background:red;
color:white;
border:none;
border-radius:50%;
width:22px;height:22px;
}

/* CONTAINER */
.container{
border:2px dashed #aaa;
padding:10px;
min-height:80px;
}

/* PANEL */
#panel{
position:fixed;
bottom:0;
width:100%;
background:#181818;
display:none;
max-height:55vh;
overflow:auto;
padding:10px;
}

.panelbtn{
width:100%;
padding:10px;
margin:5px 0;
background:#333;
color:white;
border:none;
}

input,select{
width:100%;
margin:5px 0;
padding:6px;
}
</style>
</head>

<body>

<div id="startMenu">
<h2>KhawaBuild X</h2>
<button class="startBtn" onclick="login()">Login Google</button>
<button class="startBtn" onclick="start()">Masuk Editor</button>
</div>

<div id="topbar">
<div>
<button onclick="openAdd()">Add</button>
<button onclick="openStyle()">Style</button>
<button onclick="saveLocal()">💾 Local</button>
<button onclick="saveCloud()">☁️ Cloud</button>
</div>

<div>
<button onclick="openAddon()">⚡ Addon</button>
<button onclick="deployGithub()">🚀 Deploy</button>
</div>
</div>

<div id="preview"></div>
<div id="panel"></div>

<script>

/* GLOBAL */
window.builder = {
selected:null,
preview:null,
panel:null
}

builder.preview = document.getElementById("preview")
builder.panel = document.getElementById("panel")

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCFBq7tASy3IeRb-GFaLFuvB5NcwydkHUM",
authDomain: "knockthem-25783.firebaseapp.com",
projectId: "knockthem-25783",
storageBucket: "knockthem-25783.firebasestorage.app",
messagingSenderId: "620826019120",
appId: "1:620826019120:web:7a0990878cc55e3a1bf4f5"
};

firebase.initializeApp(firebaseConfig)
const auth = firebase.auth()
const db = firebase.firestore()

function login(){
let provider = new firebase.auth.GoogleAuthProvider()
auth.signInWithPopup(provider)
}

function start(){
document.getElementById("startMenu").style.display="none"
}

/* SELECT */
function select(el){
if(builder.selected) builder.selected.classList.remove("selected")
builder.selected = el
el.classList.add("selected")
}

/* CREATE */
function create(html){
let target = builder.preview

if(builder.selected && builder.selected.querySelector(".container")){
target = builder.selected.querySelector(".container")
}

let el=document.createElement("div")
el.className="element"
el.innerHTML=`<button class="deleteBtn">x</button>${html}`

el.onclick=e=>{
e.stopPropagation()
select(el)
}

el.querySelector(".deleteBtn").onclick=e=>{
e.stopPropagation()
el.remove()
}

target.appendChild(el)
}

/* ADD */
function openAdd(){
builder.panel.style.display="block"
builder.panel.innerHTML=`
<b>Add</b>
<button onclick="closePanel()">X</button>

<button class="panelbtn" onclick="create('<h1 contenteditable>Header</h1>')">Header</button>
<button class="panelbtn" onclick="create('<p contenteditable>Text</p>')">Text</button>
<button class="panelbtn" onclick="create('<button>Button</button>')">Button</button>
<button class="panelbtn" onclick="create('<div class=container>Container</div>')">Container</button>
`
}

/* STYLE */
function openStyle(){
if(!builder.selected){alert("Pilih element");return}

builder.panel.style.display="block"
builder.panel.innerHTML=`
<b>Style</b>
<button onclick="closePanel()">X</button>

Color<input type=color oninput="builder.selected.style.color=this.value">
Bg<input type=color oninput="builder.selected.style.background=this.value">

Align
<select onchange="builder.selected.style.textAlign=this.value">
<option>left</option>
<option>center</option>
<option>right</option>
</select>

Size<input type=range min=10 max=60 oninput="builder.selected.style.fontSize=this.value+'px'">
`
}

/* ADDON */
function openAddon(){

if(!window.customAddon){
alert("Belum ada addon!")
return
}

builder.panel.style.display="block"

window.customAddon.open({
panel:builder.panel,
selected:builder.selected,
create:create
})
}

/* SAVE */
let lastSave=0

async function saveCloud(){

let user = auth.currentUser
if(!user){alert("Login dulu");return}

let now = Date.now()
if(now - lastSave < 2000){alert("Tunggu!");return}
lastSave = now

let html = builder.preview.innerHTML

let ref = db.collection("projects").doc(user.uid)
let doc = await ref.get()

let list = doc.exists ? doc.data().list || [] : []

if(list.length>=2){
alert("Max 2 project cloud")
return
}

list.push({html:html})

await ref.set({list:list})

alert("Tersimpan cloud!")
}

function saveLocal(){
localStorage.setItem("project_"+Date.now(),builder.preview.innerHTML)
alert("Tersimpan lokal!")
}

/* DEPLOY */
function deployGithub(){

let html = `
<!DOCTYPE html>
<html><body>
${builder.preview.innerHTML}
</body></html>
`

let blob = new Blob([html], {type:"text/html"})
let a = document.createElement("a")
a.href = URL.createObjectURL(blob)
a.download = "index.html"
a.click()

alert("Upload ke GitHub Pages!")
}

/* PANEL */
function closePanel(){
builder.panel.style.display="none"
}

/* LOAD ADDON */
let active = localStorage.getItem("activeAddon")

if(active){
let code = localStorage.getItem("addon_"+active)
if(code){
let script=document.createElement("script")
script.textContent=code
document.body.appendChild(script)
}
}

</script>

</body>
</html>
