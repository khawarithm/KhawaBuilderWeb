<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KhawaBuild X PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0e0e0e;
color:white;
}

/* TOPBAR */
#topbar{
background:#121212;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}

.group button{
background:#1f1f1f;
color:white;
border:none;
padding:8px 12px;
margin:2px;
border-radius:6px;
}

/* PREVIEW */
#preview{
background:white;
color:black;
min-height:80vh;
margin:10px;
border-radius:10px;
padding:10px;
overflow:auto;
}

/* ELEMENT */
.element{
border:2px dashed transparent;
margin:8px;
padding:10px;
position:relative;
}

.element.selected{
border-color:#00aaff;
}

/* DELETE */
.deleteBtn{
position:absolute;
top:-10px;
right:-10px;
background:red;
color:white;
border:none;
border-radius:50%;
width:20px;height:20px;
}

/* PANEL */
#panel{
position:fixed;
bottom:0;
width:100%;
background:#181818;
display:none;
max-height:60vh;
overflow:auto;
padding:10px;
border-top:1px solid #333;
}

.panelbtn{
width:100%;
padding:10px;
margin:5px 0;
background:#333;
color:white;
border:none;
border-radius:6px;
}

/* CONTAINER */
.container{
border:2px dashed #aaa;
min-height:80px;
padding:10px;
}
</style>
</head>

<body>

<div id="topbar">
<div class="group">
<button onclick="openAdd()">Add</button>
<button onclick="openStyle()">Style</button>
<button onclick="openBodyStyle()">Body</button>
<button onclick="openLoad()">📂 Load</button>
<button onclick="saveLocal()">💾 Local</button>
<button onclick="saveCloud()">☁️ Cloud</button>
</div>

<div class="group">
<button onclick="openAddon()">⚡ Addon</button>
<button onclick="downloadZIP()">📦 ZIP</button>
<button onclick="deployHTML()">⬇️ HTML</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div id="preview"></div>
<div id="panel"></div>

<script>

/* LOGIN */
let currentUser = localStorage.getItem("user")
if(!currentUser) location.href="login.html"

/* FIREBASE */
const firebaseConfig={
apiKey:"AIzaSyCFBq7tASy3IeRb-GFaLFuvB5NcwydkHUM",
authDomain:"knockthem-25783.firebaseapp.com",
projectId:"knockthem-25783"
};

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

/* GLOBAL */
let preview=document.getElementById("preview")
let panel=document.getElementById("panel")
let selected=null

/* SELECT */
function select(el){
if(selected)selected.classList.remove("selected")
selected=el
el.classList.add("selected")
}

/* CREATE */
function create(html){
let target=preview

if(selected && selected.querySelector(".container")){
target=selected.querySelector(".container")
}

let el=document.createElement("div")
el.className="element"
el.innerHTML=`<button class="deleteBtn">x</button>${html}`

el.onclick=e=>{
e.stopPropagation()
select(el)
}

el.querySelector(".deleteBtn").onclick=e=>{
e.stopPropagation()
el.remove()
}

target.appendChild(el)
}

/* FILE BASE64 */
function toBase64(file,cb){
let r=new FileReader()
r.onload=()=>cb(r.result)
r.readAsDataURL(file)
}

/* MEDIA */
function addImage(){
let i=document.createElement("input")
i.type="file"
i.accept="image/*"
i.onchange=e=>toBase64(e.target.files[0],url=>{
create(`<img src="${url}" style="max-width:100%">`)
})
i.click()
}

function addVideo(){
let i=document.createElement("input")
i.type="file"
i.accept="video/*"
i.onchange=e=>toBase64(e.target.files[0],url=>{
create(`<video src="${url}" controls></video>`)
})
i.click()
}

function addAudio(){
let i=document.createElement("input")
i.type="file"
i.accept="audio/*"
i.onchange=e=>toBase64(e.target.files[0],url=>{
create(`<audio src="${url}" controls></audio>`)
})
i.click()
}

/* ADD */
function openAdd(){
panel.style.display="block"
panel.innerHTML=`
<b>Add Element</b><button onclick="closePanel()">X</button>

<button class="panelbtn" onclick="create('<h1 contenteditable>Header</h1>')">Header</button>
<button class="panelbtn" onclick="create('<p contenteditable>Text</p>')">Text</button>
<button class="panelbtn" onclick="create('<button>Button</button>')">Button</button>
<button class="panelbtn" onclick="create('<div class=container></div>')">Container</button>

<hr>

<button class="panelbtn" onclick="addImage()">🖼 Image</button>
<button class="panelbtn" onclick="addVideo()">🎥 Video</button>
<button class="panelbtn" onclick="addAudio()">🔊 Audio</button>
`
}

/* STYLE PRO */

function bgImage(){
let i=document.createElement("input")
i.type="file"
i.accept="image/*"
i.onchange=e=>{
toBase64(e.target.files[0],url=>{
selected.style.backgroundImage=`url(${url})`
selected.style.backgroundSize="cover"
})
}
i.click()
}

/* BODY */
function openBodyStyle(){
panel.style.display="block"
panel.innerHTML=`
<b>Body</b><button onclick="closePanel()">X</button>

Background<input type=color oninput="preview.style.background=this.value">
Text<input type=color oninput="preview.style.color=this.value">
`
}
function openStyle(){

if(!selected){
alert("Pilih element dulu!")
return
}

panel.style.display="block"

panel.innerHTML=`

<h3>🎨 Style Editor</h3>
<button onclick="closePanel()">✖</button>

<!-- TEXT -->
<h4>📝 Text</h4>

Color<br>
<input type="color" oninput="selected.style.color=this.value"><br>

Font Size<br>
<input type="range" min="10" max="100" id="fsRange">
<input type="number" id="fsNum" min="10" max="100"><br>

Font<br>
<select onchange="selected.style.fontFamily=this.value">
<option>Arial</option>
<option>Verdana</option>
<option>Courier New</option>
<option>Georgia</option>
</select><br>

Align<br>
<select onchange="selected.style.textAlign=this.value">
<option>left</option>
<option>center</option>
<option>right</option>
</select>

<hr>

<!-- SIZE -->
<h4>📦 Size</h4>

Width<br>
<input type="range" min="50" max="600" id="wRange">
<input type="number" id="wNum"><br>

Height<br>
<input type="range" min="50" max="600" id="hRange">
<input type="number" id="hNum"><br>

<hr>

<!-- SPACING -->
<h4>📏 Spacing</h4>

Padding<br>
<input type="range" min="0" max="50" id="pRange">
<input type="number" id="pNum"><br>

Margin<br>
<input type="range" min="0" max="50" id="mRange">
<input type="number" id="mNum"><br>

<hr>

<!-- BACKGROUND -->
<h4>🎨 Background</h4>

Color<br>
<input type="color" oninput="selected.style.background=this.value"><br>

<button onclick="bgImage()">🖼 Background Image</button>

<hr>

<!-- BORDER -->
<h4>🧱 Border</h4>

Width<br>
<input type="range" min="0" max="10" id="bwRange">
<input type="number" id="bwNum"><br>

Color<br>
<input type="color" id="bColor"><br>

Style<br>
<select id="bStyle">
<option>solid</option>
<option>dashed</option>
<option>dotted</option>
</select>

<hr>

<!-- SHADOW -->
<h4>🌫 Shadow</h4>

X<input type="range" min="-50" max="50" id="sx">
Y<input type="range" min="-50" max="50" id="sy">
Blur<input type="range" min="0" max="50" id="sb">
Color<input type="color" id="sc">

`
/* ===== SYNC SYSTEM ===== */

function bind(rangeId, numId, callback){
let r=document.getElementById(rangeId)
let n=document.getElementById(numId)

r.oninput=()=>{
n.value=r.value
callback(r.value)
}

n.oninput=()=>{
r.value=n.value
callback(n.value)
}
}

/* SIZE */
bind("wRange","wNum",v=>selected.style.width=v+"px")
bind("hRange","hNum",v=>selected.style.height=v+"px")

/* TEXT */
bind("fsRange","fsNum",v=>selected.style.fontSize=v+"px")

/* SPACING */
bind("pRange","pNum",v=>selected.style.padding=v+"px")
bind("mRange","mNum",v=>selected.style.margin=v+"px")

/* BORDER */
bind("bwRange","bwNum",v=>selected.style.borderWidth=v+"px")

document.getElementById("bColor").oninput=e=>{
selected.style.borderColor=e.target.value
}

document.getElementById("bStyle").onchange=e=>{
selected.style.borderStyle=e.target.value
}

/* SHADOW */
function updateShadow(){
let x=document.getElementById("sx").value
let y=document.getElementById("sy").value
let b=document.getElementById("sb").value
let c=document.getElementById("sc").value

selected.style.boxShadow=`${x}px ${y}px ${b}px ${c}`
}

["sx","sy","sb","sc"].forEach(id=>{
document.getElementById(id).oninput=updateShadow
})

  }
/* ADDON */
function openAddon(){
location.href="addon.html"
}

/* SAVE */
function saveLocal(){
localStorage.setItem("project_"+Date.now(),preview.innerHTML)
alert("Saved local")
}

async function saveCloud(){
let ref=db.collection("projects").doc(currentUser)
let doc=await ref.get()
let list=doc.exists?doc.data().list||[]:[]

if(list.length>=2){alert("Max 2");return}

list.push({html:preview.innerHTML})
await ref.set({list})
alert("Saved cloud")
}

/* LOAD */
function openLoad(){
panel.style.display="block"
panel.innerHTML=`<b>Load</b><button onclick="closePanel()">X</button>`

for(let i in localStorage){
if(i.startsWith("project_")){
panel.innerHTML+=`<button class="panelbtn" onclick="loadLocal('${i}')">${i}</button>`
}
}

loadCloud()
}

function loadLocal(k){
preview.innerHTML=localStorage.getItem(k)
}

async function loadCloud(){
let doc=await db.collection("projects").doc(currentUser).get()
if(!doc.exists)return

window.cloudData=doc.data().list

cloudData.forEach((p,i)=>{
panel.innerHTML+=`<button class="panelbtn" onclick="loadCloudItem(${i})">Cloud ${i}</button>`
})
}

function loadCloudItem(i){
preview.innerHTML=window.cloudData[i].html
}

/* CLEAN EXPORT */
function cleanHTML(){
let clone=preview.cloneNode(true)
clone.querySelectorAll(".deleteBtn").forEach(e=>e.remove())
clone.querySelectorAll(".element").forEach(e=>e.classList.remove("element","selected"))
return clone.innerHTML
}

/* HTML */
function deployHTML(){
let html=`<!DOCTYPE html><html><body>${cleanHTML()}</body></html>`
let blob=new Blob([html])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="index.html"
a.click()
}

/* ZIP */
async function downloadZIP(){
let zip=new JSZip()
zip.file("index.html",`<!DOCTYPE html><html><body>${cleanHTML()}</body></html>`)
let blob=await zip.generateAsync({type:"blob"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="website.zip"
a.click()
}

/* PANEL */
function closePanel(){panel.style.display="none"}

/* LOGOUT */
function logout(){
localStorage.removeItem("user")
location.href="login.html"
}

</script>

</body>
</html>
