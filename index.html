<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KhawaBuild X Clean</title>

<style>
body{margin:0;font-family:Arial;background:#0e0e0e;color:white}

#topbar{
display:flex;justify-content:space-between;
padding:10px;background:#121212;border-bottom:1px solid #333
}

button{
background:#1f1f1f;color:white;border:none;
padding:8px;margin:2px;border-radius:6px
}

#preview{
background:white;color:black;
min-height:80vh;margin:10px;
border-radius:10px;padding:10px;
position:relative;
}

.element{
border:2px dashed transparent;
margin:8px;padding:10px;
position:relative;
}
.element.selected{border-color:#00aaff}

.deleteBtn{
position:absolute;top:-10px;right:-10px;
background:red;color:white;border:none;
border-radius:50%;width:20px;height:20px
}

.dragBtn{
position:absolute;top:-10px;left:-10px;
background:#00aaff;color:white;
border:none;border-radius:4px;
cursor:grab;font-size:12px
}

.inner{pointer-events:auto}

#panel{
position:fixed;bottom:0;width:100%;
background:#181818;display:none;
max-height:60vh;overflow:auto;padding:10px
}

.panelbtn{
width:100%;padding:10px;margin:5px 0;
background:#333;color:white;border:none;border-radius:6px
}

.container{
border:2px dashed #aaa;
min-height:80px;padding:10px
}
</style>
</head>

<body>

<div id="topbar">
<div>
<button onclick="openAdd()">Add</button>
<button onclick="openStyle()">Style</button>
<button onclick="runAddon()">Run Addon</button>
<button onclick="exportHTML()">Export</button>
</div>
<div>
<button onclick="manageAddon()">Addon</button>
</div>
</div>

<div id="preview"></div>
<div id="panel"></div>

<script>

let preview=document.getElementById("preview")
let panel=document.getElementById("panel")
let selected=null

/* SELECT */
function select(el){
if(selected)selected.classList.remove("selected")
selected=el
el.classList.add("selected")
}

/* SAFE HTML */
function safeHTML(html){
return html.replace(/<script.*?>.*?<\/script>/gi,"")
}

/* CREATE */
function create(html){

let target=preview
if(selected && selected.querySelector(".container")){
target=selected.querySelector(".container")
}

let el=document.createElement("div")
el.className="element"

el.innerHTML=`
<button class="deleteBtn">x</button>
<div class="dragBtn">☰</div>
<div class="inner">${safeHTML(html)}</div>
`

let inner=el.querySelector(".inner")

/* SELECT (AMAN) */
el.addEventListener("click",function(e){
if(e.target!==el && !e.target.classList.contains("dragBtn")) return
select(el)
})

/* DELETE */
el.querySelector(".deleteBtn").onclick=e=>{
e.stopPropagation()
el.remove()
}

/* DRAG */
let dragBtn=el.querySelector(".dragBtn")

dragBtn.onmousedown=function(e){

e.preventDefault()

let shiftX=e.clientX-el.getBoundingClientRect().left
let shiftY=e.clientY-el.getBoundingClientRect().top

el.style.position="absolute"
el.style.zIndex=1000

function moveAt(x,y){
el.style.left=x-shiftX+"px"
el.style.top=y-shiftY+"px"
}

function onMove(e){
moveAt(e.pageX,e.pageY)
}

document.addEventListener("mousemove",onMove)

document.onmouseup=function(){
document.removeEventListener("mousemove",onMove)
document.onmouseup=null
}

}

target.appendChild(el)
}

/* ADD */
function openAdd(){
panel.style.display="block"
panel.innerHTML=`
<b>Add</b>
<button onclick="closePanel()">X</button>

<button class="panelbtn" onclick="create('<h1 contenteditable>Header</h1>')">Header</button>
<button class="panelbtn" onclick="create('<p contenteditable>Text</p>')">Text</button>
<button class="panelbtn" onclick="create('<button>Button</button>')">Button</button>
<button class="panelbtn" onclick="create('<div class=container></div>')">Container</button>
`
}

/* STYLE */
function openStyle(){
if(!selected){alert("Pilih dulu");return}

let real=selected.querySelector(".inner").firstElementChild

panel.style.display="block"
panel.innerHTML=`
<b>Style</b>
<button onclick="closePanel()">X</button>

Color<input type=color oninput="real.style.color=this.value">
Bg<input type=color oninput="real.style.background=this.value">
Font<input type=range min=10 max=60 oninput="real.style.fontSize=this.value+'px'">
`
}

/* ADDON LOAD */
function loadAddon(){
let id=localStorage.getItem("activeAddon")
let code=localStorage.getItem("addon_"+id)
if(code){
try{eval(code)}catch(e){console.log(e)}
}
}
loadAddon()

function runAddon(){
if(!window.customAddon){
alert("Addon belum aktif")
return
}

window.customAddon.open({
panel:panel,
selected:selected
})
}

/* ADDON MANAGER */
function manageAddon(){
panel.style.display="block"
panel.innerHTML="<b>Addon</b><button onclick='closePanel()'>X</button>"

for(let i in localStorage){
if(i.startsWith("addon_")){
let id=i.replace("addon_","")
panel.innerHTML+=`
<button class="panelbtn" onclick="deleteAddon('${id}')">Hapus ${id}</button>
`
}
}
}

function deleteAddon(id){
localStorage.removeItem("addon_"+id)
alert("Deleted")
}

/* EXPORT */
function exportHTML(){

let clone=preview.cloneNode(true)

clone.querySelectorAll(".deleteBtn,.dragBtn").forEach(e=>e.remove())

clone.querySelectorAll(".element").forEach(w=>{
let real=w.querySelector(".inner")
if(real) w.replaceWith(real)
})

let html=`
<!DOCTYPE html>
<html>
<body>
${clone.innerHTML}
</body>
</html>
`

let blob=new Blob([html])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="index.html"
a.click()
}

/* PANEL */
function closePanel(){
panel.style.display="none"
}

</script>

</body>
</html>
