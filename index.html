<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KhawaBuild X PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0e0e0e;
color:white;
}

/* START */
#startMenu{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:linear-gradient(135deg,#111,#1c1c1c);
z-index:999;
}

.startBtn{
padding:15px 25px;
background:linear-gradient(45deg,#00aaff,#0066ff);
border:none;
color:white;
border-radius:8px;
}

/* TOP */
#topbar{
background:#141414;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* PREVIEW */
#preview{
background:white;
color:black;
min-height:80vh;
margin:10px;
border-radius:10px;
padding:10px;
}

/* ELEMENT */
.element{
border:2px dashed transparent;
padding:10px;
margin:8px 0;
position:relative;
transition:0.2s;
}

.element:hover{
border-color:#555;
}

.element.selected{
border-color:#00aaff;
box-shadow:0 0 10px #00aaff;
}

/* DELETE */
.deleteBtn{
position:absolute;
top:-10px;
right:-10px;
background:red;
border:none;
color:white;
border-radius:50%;
width:22px;height:22px;
cursor:pointer;
}

/* CONTAINER */
.container{
border:2px dashed #aaa;
padding:10px;
min-height:80px;
border-radius:8px;
}

/* PANEL */
#panel{
position:fixed;
bottom:0;
width:100%;
background:#181818;
display:none;
max-height:55vh;
overflow:auto;
padding:10px;
border-top:2px solid #00aaff;
z-index:999;
}

.panelbtn{
width:100%;
padding:10px;
margin:5px 0;
background:#333;
color:white;
border:none;
border-radius:6px;
}

input,select{
width:100%;
margin:5px 0;
padding:6px;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<div id="startMenu">
<h2>KhawaBuild X PRO</h2>
<button class="startBtn" onclick="newProject()">New Project</button>
<button class="startBtn" onclick="loadProject()">Continue</button>
</div>

<div id="topbar">
<div>
<button onclick="openAdd()">Add</button>
<button onclick="openStyle()">Style</button>
<button onclick="save()">Save</button>
</div>

<div>
<button onclick="openAddonPage()">➕ Add-on</button>
<button onclick="openAddon()">⚡ Use Addon</button>
<button onclick="duplicate()">Duplicate</button>
<button onclick="bringFront()">Front</button>
<button onclick="sendBack()">Back</button>
</div>
</div>

<div id="preview"></div>
<div id="panel"></div>

<script>

let preview=document.getElementById("preview")
let panel=document.getElementById("panel")
let selected=null

/* PROJECT */
function newProject(){
localStorage.removeItem("project")
preview.innerHTML=""
document.getElementById("startMenu").style.display="none"
}

function loadProject(){
let data=localStorage.getItem("project")
if(data)preview.innerHTML=data
document.getElementById("startMenu").style.display="none"
}

/* SAVE */
function save(){
localStorage.setItem("project",preview.innerHTML)
}

/* SELECT */
function select(el){
if(selected)selected.classList.remove("selected")
selected=el
el.classList.add("selected")
}

/* CREATE */
function create(html){

let target=preview

if(selected && selected.querySelector(".container")){
target=selected.querySelector(".container")
}

let el=document.createElement("div")
el.className="element"
el.innerHTML=`<button class="deleteBtn">x</button>${html}`

el.onclick=e=>{
e.stopPropagation()
select(el)
}

el.querySelector(".deleteBtn").onclick=e=>{
e.stopPropagation()
el.remove()
save()
}

target.appendChild(el)
save()
}

/* ADD */
function openAdd(){
panel.style.display="block"
panel.innerHTML=`
<b>Add Element</b>
<button onclick="closePanel()">X</button>

<button class="panelbtn" onclick="addContainer()">Container</button>
<button class="panelbtn" onclick="create('<h1 contenteditable>Header</h1>')">Header</button>
<button class="panelbtn" onclick="create('<p contenteditable>Text</p>')">Text</button>
<button class="panelbtn" onclick="create('<button>Button</button>')">Button</button>
<button class="panelbtn" onclick="addImage()">Image</button>
`
}

function addContainer(){
create(`<div class="container">Drop here</div>`)
}

/* FILE */
function addImage(){
let i=document.createElement("input")
i.type="file"
i.accept="image/*"
i.onchange=e=>{
let url=URL.createObjectURL(e.target.files[0])
create(`<img src="${url}" style="max-width:100%">`)
}
i.click()
}

/* STYLE */
function openStyle(){
if(!selected){alert("Select element dulu!");return}

panel.style.display="block"
panel.innerHTML=`
<b>Style</b>
<button onclick="closePanel()">X</button>

Color<input type=color oninput="selected.style.color=this.value">
Bg<input type=color oninput="selected.style.background=this.value">

Font Size<input type=range min=10 max=60 oninput="selected.style.fontSize=this.value+'px'">

Align
<select onchange="selected.style.textAlign=this.value">
<option value="left">Left</option>
<option value="center">Center</option>
<option value="right">Right</option>
<option value="justify">Justify</option>
</select>

Width<input type=range min=50 max=500 oninput="selected.style.width=this.value+'px'">
Height<input type=range min=50 max=500 oninput="selected.style.height=this.value+'px'">

Padding<input type=range min=0 max=50 oninput="selected.style.padding=this.value+'px'">
Margin<input type=range min=0 max=50 oninput="selected.style.margin=this.value+'px'">

Radius<input type=range min=0 max=50 oninput="selected.style.borderRadius=this.value+'px'">

Shadow<input type=range min=0 max=30 oninput="selected.style.boxShadow='0 0 '+this.value+'px black'">

Opacity<input type=range min=0 max=1 step=0.1 oninput="selected.style.opacity=this.value">

Z-index<input type=number oninput="selected.style.zIndex=this.value">
`
}

/* ADDON TOOL */
function openAddon(){

if(!window.customAddon){
alert("Belum ada addon aktif!")
return
}

panel.style.display="block"
window.customAddon.open(panel, selected)

}

/* EXTRA */
function duplicate(){
if(!selected)return
let clone=selected.cloneNode(true)
preview.appendChild(clone)
save()
}

function bringFront(){
if(selected)selected.style.zIndex=999
}

function sendBack(){
if(selected)selected.style.zIndex=0
}

/* PANEL */
function closePanel(){
panel.style.display="none"
}

/* ADDON PAGE */
function openAddonPage(){
window.location.href="addon.html"
}

/* LOAD ADDON */
let active = localStorage.getItem("activeAddon")

if(active){

let code = localStorage.getItem("addon_"+active)

if(code){
let script=document.createElement("script")
script.textContent=code
document.body.appendChild(script)
console.log("Addon loaded:", active)
}

}

</script>

</body>
</html>
